context:
  name: s3manager
  version: "0.7.0"

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  - url: https://github.com/cloudlena/${{ name }}/archive/refs/tags/v${{ version }}.tar.gz
    sha256: b021f3f3234217939435182a5b35bdc651504c341f8ba2b0e2953de605f1c7da
    target_directory: src

build:
  number: 0
  script:
    - cd src
    # github.com/cloudlena/adapters is Apache-2.0 licensed (see
    # https://github.com/cloudlena/adapters/blob/HEAD/LICENSE), but its LICENSE
    # file lacks the canonical Apache-2.0 header so go-licenses cannot
    # auto-classify it. Ignore it during go-licenses scan and copy the LICENSE
    # in manually so it still ships with the package.
    - go-licenses save ./ --save_path ../library_licenses --ignore github.com/cloudlena/s3manager --ignore github.com/cloudlena/adapters
    - if: win
      then:
        - for /d %%D in ("%GOMODCACHE%\github.com\cloudlena\adapters@*") do xcopy /Y /I "%%D\LICENSE" "..\library_licenses\github.com\cloudlena\adapters\"
        - go build -v -buildmode=pie -trimpath -modcacherw -o %LIBRARY_BIN%\s3manager.exe -ldflags="-s" ./main.go
      else:
        - mkdir -p ../library_licenses/github.com/cloudlena/adapters
        - cp "$(go env GOMODCACHE)"/github.com/cloudlena/adapters@*/LICENSE ../library_licenses/github.com/cloudlena/adapters/LICENSE
        - go build -v -buildmode=pie -trimpath -modcacherw -o $PREFIX/bin/s3manager -ldflags="-s -w" ./main.go

requirements:
  build:
    - ${{ compiler('go-nocgo') }}
    - go-licenses

tests:
  - script:
      - if: win
        then:
          - s3manager.exe > output.txt 2>&1
          - findstr /c:"please provide ACCESS_KEY_ID" output.txt
        else: s3manager 2>&1 | grep -q "please provide ACCESS_KEY_ID"

about:
  homepage: https://github.com/cloudlena/s3manager
  summary: A Web GUI for your S3 buckets
  license: Apache-2.0
  license_file:
    - src/LICENSE
    - library_licenses/
  repository: https://github.com/cloudlena/s3manager

extra:
  recipe-maintainers:
    - delsner
    - janjagusch
